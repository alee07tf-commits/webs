<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circle top-right -->
  <circle cx="1050" cy="100" r="200" fill="#3B82F6" fill-opacity="0.08"/>
  <!-- Decorative circle bottom-left -->
  <circle cx="150" cy="530" r="150" fill="#3B82F6" fill-opacity="0.06"/>
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#3B82F6" stroke-opacity="0.04" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Icon -->
  <g transform="translate(560, 140)">
    <rect width="80" height="80" rx="16" fill="#3B82F6" fill-opacity="0.15"/>
    <path d="M24 52L36 28L44 44L52 32L60 52" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="36" cy="28" r="4" fill="#3B82F6"/>
    <circle cx="52" cy="32" r="3" fill="#60A5FA"/>
  </g>
  <!-- Brand name -->
  <text x="600" y="310" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff">
    Zappy<tspan fill="#3B82F6">Apps</tspan>
  </text>
  <!-- Subtitle -->
  <text x="600" y="370" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500" fill="#3B82F6">
    Diseno Web Estrategico con IA para PYMEs
  </text>
  <!-- URL -->
  <text x="600" y="430" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#6B7280" letter-spacing="1">
    zappyapps.tech
  </text>
</svg>